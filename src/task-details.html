<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Task Details - Supply Chain Lite</title>
    <link rel="icon" type="image/svg+xml" href="scc.svg" />
  </head>
  <body class="vh-100 d-flex flex-column overflow-hidden">
    <!-- Main Content -->
    <main class="container mt-2 flex-fill d-flex flex-column overflow-hidden">
      <!-- Loading state -->
      <div id="taskLoading" class="text-center py-5">
        <span class="spinner-border" role="status" aria-hidden="true"></span>
        <p class="mt-3 text-muted">Loading task details…</p>
      </div>

      <!-- Error state -->
      <div id="taskError" class="d-none text-center py-5">
        <p class="text-danger fw-semibold" id="taskErrorMessage">Unable to load task details.</p>
        <a href="/home-page.html" class="btn btn-outline-dark btn-sm mt-2">Back to Home</a>
      </div>

      <!-- Task detail content (hidden until loaded) -->
      <div id="taskContent" class="d-none">
        <!-- Header card -->
        <div class="card mb-3 flex-shrink-0">
          <div class="card-body">
            <div class="d-flex justify-content-between align-items-start mb-3">
              <h4 class="card-title mb-0">Task Details</h4>
              <span id="taskStatusBadge" class="badge fs-6"></span>
            </div>

            <div class="row g-3">
              <div class="col-sm-6 col-md-4">
                <div class="text-muted small">Model Name</div>
                <div class="fw-semibold" id="detailModelName">-</div>
              </div>
              <div class="col-sm-6 col-md-4">
                <div class="text-muted small">Project Name</div>
                <div class="fw-semibold" id="detailProjectName">-</div>
              </div>
              <div class="col-sm-6 col-md-4">
                <div class="text-muted small">Task Name</div>
                <div class="fw-semibold" id="detailTaskName">-</div>
              </div>
              <div class="col-sm-6 col-md-4">
                <div class="text-muted small">Submitted By</div>
                <div class="fw-semibold" id="detailSubmittedBy">-</div>
              </div>
              <div class="col-sm-6 col-md-4">
                <div class="text-muted small">Start Time</div>
                <div class="fw-semibold" id="detailStartTime">-</div>
              </div>
              <div class="col-sm-6 col-md-4" id="endTimeBlock">
                <div class="text-muted small">End Time</div>
                <div class="fw-semibold" id="detailEndTime">-</div>
              </div>
              <div class="col-sm-6 col-md-4 d-none" id="runTimeBlock">
                <div class="text-muted small">Run Time</div>
                <div class="fw-semibold" id="detailRunTime">-</div>
              </div>
            </div>

            <!-- Action buttons -->
            <div id="taskActions" class="d-none mt-3 d-flex align-items-center gap-2">
              <button class="btn btn-outline-dark btn-sm" id="refreshBtn">
                <i class="fa-solid fa-arrows-rotate me-1" aria-hidden="true"></i>
                Refresh
              </button>
              <button class="btn btn-outline-danger btn-sm" id="cancelBtn">
                <i class="fa-solid fa-ban me-1" aria-hidden="true"></i>
                Cancel Task
              </button>
              <!-- Running progress bar (right-aligned) -->
              <div id="taskRunningProgress" class="d-none ms-auto">
                <div class="progress">
                  <div
                    class="progress-bar progress-bar-striped progress-bar-animated"
                    role="progressbar"
                    aria-valuenow="100"
                    aria-valuemin="0"
                    aria-valuemax="100"
                  >
                    Running
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>

        <!-- Log section -->
        <div class="card flex-fill d-flex flex-column overflow-hidden">
          <div class="card-body flex-fill d-flex flex-column overflow-hidden">
            <div class="d-flex justify-content-between align-items-center mb-2">
              <h5 class="card-title mb-0">Task Log</h5>
              <div id="logToolbarBtns" class="d-none d-flex gap-1">
                <button class="btn btn-outline-secondary btn-sm" id="copyLogBtn" title="Copy log">
                  <i class="fa-regular fa-copy" aria-hidden="true"></i>
                </button>
                <button
                  class="btn btn-outline-secondary btn-sm"
                  id="downloadLogBtn"
                  title="Download log"
                >
                  <i class="fa-solid fa-download" aria-hidden="true"></i>
                </button>
              </div>
            </div>
            <div id="taskLogEmpty" class="text-muted fst-italic">No log output yet.</div>
            <pre id="taskLog" class="task-log-area d-none"></pre>
          </div>
        </div>
      </div>
    </main>

    <script type="module" src="page_assets/task-details/js/main.js"></script>
  </body>
</html>
